<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tauri + SvelteKit + Typescript App</title>
    <script>
      try {
        const storedTheme = localStorage.getItem('loa-tracker-theme');
        const supportedThemes = ['outlaw', 'plague-alchemist', 'void-nebula', 'sidereal-gold', 'powi'];
        const normalizedTheme = storedTheme === 'cyberpunk' ? 'powi' : storedTheme;
        const theme = supportedThemes.includes(normalizedTheme) ? normalizedTheme : 'outlaw';
        document.documentElement.dataset.theme = theme;
      } catch (_) {
        document.documentElement.dataset.theme = 'outlaw';
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
